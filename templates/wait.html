<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оплата...</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .center { text-align: center; margin-top: 20%; }
        #checkmark { display: none; color: green; font-size: 50px; }
        .spinner { width: 50px; height: 50px; }
    </style>
</head>
<body>
    <div class="center">
        <div id="loader">
            <div class="spinner-border text-primary" role="status"></div>
            <p>Ждем подтверждение оплаты...</p>
        </div>
        
        <div id="checkmark">
            <h1>✓</h1>
            <p>Заявка успешно отправлена!</p>
            <a href="/cabinet" class="btn btn-primary">Вернуться в кабинет</a>
        </div>
    </div>

    <script>
        // Имитируем процесс проверки оплаты (через 3 секунды)
        setTimeout(function() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('checkmark').style.display = 'block';
        }, 3000);
    </script>
</body>
</html>
